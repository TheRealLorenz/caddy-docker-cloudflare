version: '3'
services:
  caddy:
    image: ghcr.io/thereallorenz/caddy-docker-cloudflare:0.1.1
    container_name: caddy
    ports:
      - 443:443
      - 80:80
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    environment:
      CF_API_TOKEN: ${CF_API_TOKEN}
      CADDY_INGRESS_NETWORKS: caddy
    networks:
      - caddy
    restart: unless-stopped

networks:
  caddy:
    external: true
